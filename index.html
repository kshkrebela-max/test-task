      .date-input-to   { left: 299px; width: 240px; padding-left: 18px; }

      .date-value { font-family: 'Roboto', sans-serif; font-weight: 400; font-size: 21.6px; line-height: 1.37; color: #0087fc; }
      .checkbox-row { position: absolute; top: 112px; display: flex; align-items: center; gap: 18px; }
      .checkbox-row-1 { left: 566px; }
      .checkbox-row-2 { left: 977px; }
      .checkbox-box { width: 26px; height: 26px; flex-shrink: 0; background-color: #ffffff; border: 0.5px solid #86868a; border-radius: 3px; }
      .checkbox-label { font-family: 'Roboto', sans-serif; font-weight: 300; font-size: 21.6px; line-height: 1.37; color: #62560e; white-space: nowrap; }
      .input-label { position: absolute; top: 166px; font-family: 'Roboto', sans-serif; font-weight: 300; font-size: 21.6px; line-height: 1.2; color: #62560e; white-space: nowrap; }

      .dropdown-arrow-wrap { width: 30px; height: 28px; background-color: #ffffff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .filepath-input { position: absolute; top: 192px; left: 544px; width: 986px; height: 50px; background-color: #fffefb; border: 0.3px solid rgba(98,86,14,0.45); border-radius: 6px; }
      .import-btn { position: absolute; top: 192px; left: 1586px; width: 196px; height: 50px; background-color: #ffee80; border-radius: 6px; display: flex; align-items: center; cursor: pointer; border: none; outline: none; }
